name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy-main-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  notify-indexnow:
    needs: deploy-main-site
    runs-on: ubuntu-latest
    steps:
      - name: Ping IndexNow (Bing)
        run: |
          curl -s -o /dev/null -w "IndexNow HTTP %{http_code}\n" \
            -X POST https://api.indexnow.org/indexnow \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "arcen-advisory.vercel.app",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "keyLocation": "https://arcen-advisory.vercel.app/${{ secrets.INDEXNOW_KEY }}.txt",
              "urlList": [
                "https://arcen-advisory.vercel.app/"
              ]
            }'
